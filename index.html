<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi MBG</title>
    <!-- Bootstrap untuk grid dan layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-yellow: #e8b833;
            --dark-black: #11121a;
            --accent-red: #db310b;
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-yellow); 
            font-family: 'Inter', sans-serif;
            color: var(--dark-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card { 
            border: none;
            border-radius: 4px; 
            box-shadow: 20px 20px 0px var(--dark-black); /* Efek bayangan tegas */
            overflow: hidden;
        }

        /* Header dengan warna Hitam #11121a[cite: 2] */
        .header-section { 
            background: var(--dark-black); 
            color: var(--white); 
            padding: 30px; 
            border-bottom: 5px solid var(--accent-red);
        }

        .header-section h3 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--bg-yellow);
        }

        .card-body {
            background: var(--white);
            padding: 40px !important;
        }

        .form-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--dark-black);
        }

        .form-control, .form-select {
            border: 2px solid var(--dark-black);
            border-radius: 0;
            padding: 12px;
            font-weight: 500;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-red);
            box-shadow: none;
        }

        /* Tombol dengan warna Merah #db310b[cite: 2] */
        .btn-primary {
            background-color: var(--accent-red);
            border: none;
            border-radius: 0;
            padding: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--dark-black);
            transform: translateY(-3px);
        }

        .alert-success {
            background-color: var(--dark-black);
            color: var(--bg-yellow);
            border: none;
            border-radius: 0;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <!-- Struktur Header dari Referensi[cite: 2] -->
                <div class="header-section text-center">
                    <h3>Formulir Pengambilan MBG</h3>
                    <p class="mb-0 opacity-75">Sistem Verifikasi & Sinkronisasi Data</p>
                </div>
                <div class="card-body">
                    <!-- Form Input Berdasarkan Struktur Referensi[cite: 2] -->
                    <form id="formMBG">
                        <div class="mb-4">
                            <label class="form-label">Nama Sekolah / Lokasi Distribusi</label>
                            <input type="text" class="form-control" id="lokasi" placeholder="Masukkan nama lokasi..." required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Jumlah Paket MBG</label>
                                <input type="number" class="form-control" id="jumlah" placeholder="0" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Waktu Kedatangan</label>
                                <input type="time" class="form-control" id="waktu" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Petugas Penerima (PIC)</label>
                            <input type="text" class="form-control" id="petugas" placeholder="Nama lengkap petugas..." required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Kondisi Kelayakan Makanan</label>
                            <select class="form-select" id="kondisi">
                                <option value="Sangat Baik">Sangat Baik (Tersegel)</option>
                                <option value="Layak">Layak Konsumsi</option>
                                <option value="Ada Kerusakan">Ada Kerusakan / Kurang</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2 mt-2">
                            <button type="submit" class="btn btn-primary btn-lg">Konfirmasi & Kirim Data</button>
                        </div>
                    </form>
                </div>
            </div>
            <!-- Alert Status[cite: 2] -->
            <div id="status" class="mt-4"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('formMBG').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            lokasi: document.getElementById('lokasi').value,
            jumlah: document.getElementById('jumlah').value,
            waktu: document.getElementById('waktu').value,
            petugas: document.getElementById('petugas').value,
            kondisi: document.getElementById('kondisi').value,
            timestamp: new Date().toLocaleString('id-ID')
        };

        // Simulasi Logika Pengiriman[cite: 2]
        console.log("Sinkronisasi Berhasil:", data);
        
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = `
            <div class="alert alert-success p-4 shadow">
                <div class="d-flex align-items-center">
                    <div class="me-3" style="font-size: 1.5rem;">✅</div>
                    <div>
                        <strong>DATA TERCATAT!</strong><br>
                        Pengambilan di ${data.lokasi} telah diverifikasi pada ${data.timestamp}.
                    </div>
                </div>
            </div>
        `;
        
        // Reset form setelah kirim[cite: 2]
        this.reset();
        
        // Scroll ke status agar terlihat
        statusDiv.scrollIntoView({ behavior: 'smooth' });
    });
</script>

</body>
</html>
